# Must match the Worker name in Cloudflare (repo / Workers Builds use bilbo-s-riddles).
name = "bilbo-s-riddles"
main = "src/index.ts"
compatibility_date = "2025-04-01"

[[durable_objects.bindings]]
name = "QUIZ_COORDINATOR"
class_name = "QuizCoordinator"

# Workers Free plan requires SQLite-backed Durable Objects (error 10097 if you use legacy new_classes only).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["QuizCoordinator"]

[vars]
# Overridden in CI: APP_VERSION, GIT_SHA
# Set PLAY_CHAT_ID, TEST_CHAT_ID, OPERATOR_USER_IDS in dashboard or .dev.vars (see quickstart)
